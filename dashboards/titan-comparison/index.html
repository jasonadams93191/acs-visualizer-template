        { id: "cost", label: "Cost Analysis" },

              Every signature, form submission, and client portal interaction flows directly into Salesforce.

          </div>

            <div style={{ maxWidth: 960, margin: "0 auto", display: "flex" }}>

                <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
                  padding: "12px 16px", border: "none", background: "none", cursor: "pointer",
                  fontSize: 13, fontFamily: "Georgia, serif",
                  color: activeTab === tab.id ? "#1C1917" : "#6B7280",
                  borderBottom: activeTab === tab.id ? "2px solid #7C3AED" : "2px solid transparent",
                  fontWeight: activeTab === tab.id ? 700 : 400,
                  transition: "all 0.15s", marginBottom: -1,
                }}>{tab.label}</button>
              ))}
            </div>
          </div>

          <div style={{ maxWidth: 960, margin: "0 auto", padding: "28px 32px 60px" }}>

            {/* OVERVIEW */}
            {activeTab === "overview" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

                {/* Current Stack */}

                  <div style={{ fontSize: 11, fontFamily: "monospace", letterSpacing: "0.1em", color: "#6B7280", textTransform: "uppercase", marginBottom: 12 }}>

                        borderLeft: `4px solid ${tool.color}`,

                      }}>

                      <th style={{ padding: "12px 18px", textAlign: "left", color: "#9CA3AF", fontWeight: 400, fontFamily: "monospace", fontSize: 10, letterSpacing: "0.1em" }}>TOOL</th>
                      <th style={{ padding: "12px 14px", textAlign: "left", color: "#9CA3AF", fontWeight: 400, fontFamily: "monospace", fontSize: 10 }}>PURPOSE</th>
                      <th style={{ padding: "12px 18px", textAlign: "right", color: "#9CA3AF", fontWeight: 400, fontFamily: "monospace", fontSize: 10 }}>ANNUAL COST</th>
                      <th style={{ padding: "12px 14px", textAlign: "center", color: "#9CA3AF", fontWeight: 400, fontFamily: "monospace", fontSize: 10 }}>SF NATIVE</th>

                      <td colSpan={2} style={{ padding: "12px 18px", fontWeight: 700, fontFamily: "monospace", fontSize: 11, textTransform: "uppercase", color: "#374151" }}>Current Stack Total</td>
                      <td style={{ padding: "12px 18px", textAlign: "right", fontWeight: 700, color: "#DC2626" }}>{fmt(currentTotal)}</td>
                      <td />
                    </tr>
                    <tr style={{ borderTop: "2px solid #DDD6FE", background: "#F5F3FF" }}>
                      <td style={{ padding: "14px 18px" }}>
                        <span style={{ display: "inline-block", width: 10, height: 10, borderRadius: "50%", background: "#7C3AED", marginRight: 8 }} />

                      <td style={{ padding: "14px 14px", color: "#6B7280", fontSize: 12 }}>eSign · Doc Gen · Portal · Forms</td>
                      <td style={{ padding: "14px 18px", textAlign: "right", fontWeight: 700, color: "#7C3AED" }}>{fmt(data.titan.cost)}</td>
                      <td style={{ padding: "14px 14px", textAlign: "center" }}><span style={{ color: "#059669", fontWeight: 700, fontSize: 16 }}>✓</span></td>

                </table>

                </div>
              </div>
            )}

            {/* FEATURES */}
            {activeTab === "features" && (
              <div>
                <table style={{ width: "100%", borderCollapse: "collapse", background: "#fff", borderRadius: 8, overflow: "hidden", border: "1px solid #E5E7EB", fontSize: 13 }}>

                    </tr>

                  <tbody>
                    {data.features.map((cat, ci) => (
                      <>
                        <tr key={`cat-${ci}`} style={{ background: "#F9FAFB", cursor: "pointer" }} onClick={() => setExpandedCat(expandedCat === ci ? null : ci)}>

                            {expandedCat === ci ? "▾" : "▸"} {cat.category}
                          </td>
                        </tr>
                        {(expandedCat === null || expandedCat === ci) && cat.items.map((item, ii) => (
                          <tr key={`item-${ci}-${ii}`} style={{ borderTop: "1px solid #F3F4F6", background: ii % 2 === 0 ? "#fff" : "#FAFAFA" }}>
                            <td style={{ padding: "10px 18px", color: "#374151" }}>{item.name}</td>
                            <td style={{ padding: "10px 12px", textAlign: "center" }}>{renderBool(item.hellosign)}</td>
                            <td style={{ padding: "10px 12px", textAlign: "center" }}>{renderBool(item.hona)}</td>
                            <td style={{ padding: "10px 12px", textAlign: "center" }}>{renderBool(item.jotform)}</td>
                            <td style={{ padding: "10px 12px", textAlign: "center" }}>{renderBool(item.titan)}</td>
                          </tr>
                        ))}
                      </>
                    ))}
                  </tbody>
                </table>
                <div style={{ fontSize: 12, color: "#6B7280", fontFamily: "monospace", marginTop: 10 }}>
                  Click a category row to isolate · <span style={{ color: "#059669", fontWeight: 700 }}>✓</span> Available &nbsp; <span style={{ color: "#D1D5DB", fontWeight: 700 }}>✗</span> Not Available
                </div>
              </div>
            )}

            {/* ADDED CAPABILITIES */}
            {activeTab === "added" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

                {/* Onboarding spotlight */}
                <div style={{ background: "#FEF2F2", border: "2px solid #FECACA", borderLeft: "4px solid #DC2626", borderRadius: 8, padding: 22, marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                    <span style={{ fontSize: 10, fontFamily: "monospace", background: "#DC2626", color: "#fff", padding: "3px 10px", borderRadius: 4, textTransform: "uppercase" }}>Critical Gap Solved</span>
                    <span style={{ fontSize: 15, fontWeight: 700, color: "#1C1917" }}>{data.onboarding.headline}</span>
                  </div>
                  <p style={{ fontSize: 13, color: "#374151", lineHeight: 1.7, borderLeft: "3px solid #FECACA", paddingLeft: 14, marginBottom: 16 }}>{data.onboarding.body}</p>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    {data.onboarding.steps.map((step, i) => (
                      <div key={i} style={{ background: "#fff", border: "1px solid #FECACA", borderRadius: 6, padding: "12px 14px", display: "flex", gap: 12, alignItems: "flex-start" }}>
                        <span style={{ fontSize: 18, color: "#DC2626", flexShrink: 0, lineHeight: 1 }}>{step.icon}</span>
                        <div>
                          <div style={{ fontSize: 13, fontWeight: 700, color: "#1C1917", marginBottom: 3 }}>{step.label}</div>
                          <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.5 }}>{step.detail}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{ background: "#F5F3FF", border: "1px solid #DDD6FE", borderRadius: 8, padding: "14px 18px", fontSize: 13, color: "#5B21B6", lineHeight: 1.6, marginBottom: 4 }}>
                  <strong>Beyond replacement:</strong> Titan doesn't just replicate what HelloSign, HONA, and Jotform do today — it adds capabilities the current stack cannot support at all. Every item below is net-new functionality that Titan unlocks inside Salesforce.
                </div>
                {data.added.map((item, i) => (
                  <div key={i} style={{
                    display: "flex", alignItems: "flex-start", gap: 14,
                    background: "#fff", border: `1px solid ${impactColors[item.impact]?.border}`,
                    borderLeft: `3px solid ${impactColors[item.impact]?.text}`,
                    borderRadius: 6, padding: "14px 18px",
                  }}>
                    <span style={{
                      fontSize: 10, fontFamily: "monospace", whiteSpace: "nowrap",
                      background: impactColors[item.impact]?.bg,
                      color: impactColors[item.impact]?.text,
                      padding: "3px 10px", borderRadius: 4, minWidth: 60, textAlign: "center",
                    }}>{item.impact}</span>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "#1C1917", marginBottom: 3 }}>{item.capability}</div>
                      <div style={{ fontSize: 12, color: "#6B7280", fontStyle: "italic" }}>{item.note}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* MIGRATION */}
            {activeTab === "migration" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  {[
                    {
                      phase: "Week 1–2", label: "Setup & Config", color: "#7C3AED",
                      items: [
                        "Provision Titan org and connect to Salesforce instance",
                        "Configure user accounts — 1 Admin, 2 Editors, 10 Doc Gen users",
                        "Import existing document templates (up to 150)",
                        "Map Salesforce object fields for merge / generation",
                      ],
                    },
                    {
                      phase: "Week 3–4", label: "eSignature Cutover", color: "#0070D2",
                      items: [
                        "Recreate HelloSign signing workflows in Titan",
                        "Test signature triggers from Salesforce matter records",
                        "Validate signed documents attach to correct SF records",
                        "Run parallel with HelloSign for 1 week — then cut over",
                      ],
                    },
                    {
                      phase: "Week 4–6", label: "Portal & Forms Cutover", color: "#0F9D58",
                      items: [
                        "Build client portal in Titan — mirror current HONA structure",
                        "Migrate public intake forms from Jotform to Titan Forms",
                        "Validate form submissions write correctly to Salesforce records",
                        "Notify clients of new portal URL — deprecate HONA access",
                      ],
                    },
                    {
                      phase: "Week 6–8", label: "Document Generation", color: "#D97706",
                      items: [
                        "Build document generation workflows from Salesforce data",
                        "Test merge field accuracy against live matter records",
                        "Train staff on Titan document generation",
                        "Cancel HelloSign, HONA, and Jotform subscriptions",
                      ],
                    },
                  ].map((phase, i) => (
                    <div key={i} style={{ display: "flex", gap: 20, position: "relative" }}>
                      <div style={{ width: 80, textAlign: "right", flexShrink: 0, paddingTop: 2 }}>
                        <div style={{ fontSize: 10, fontFamily: "monospace", color: "#9CA3AF" }}>{phase.phase}</div>
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#374151", marginTop: 2 }}>{phase.label}</div>
                      </div>
                      <div style={{
                        width: 24, height: 24, borderRadius: "50%", background: phase.color,
                        flexShrink: 0, marginTop: 2, display: "flex", alignItems: "center", justifyContent: "center",
                        color: "#fff", fontSize: 11, fontWeight: 700,
                      }}>{i + 1}</div>
                      <div style={{ flex: 1 }}>
                        {phase.items.map((item, j) => (
                          <div key={j} style={{
                            background: "#fff", border: "1px solid #E5E7EB", borderRadius: 6,
                            padding: "10px 16px", marginBottom: 8, fontSize: 13, color: "#374151", lineHeight: 1.5,
                          }}>{item}</div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{ background: "#F0FDF4", border: "1px solid #BBF7D0", borderRadius: 8, padding: "14px 18px" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#166534", marginBottom: 4 }}>Expected Outcome</div>
                  <div style={{ fontSize: 13, color: "#14532D", lineHeight: 1.6 }}>
                    Full cutover in approximately 8 weeks. Three vendor contracts cancelled. One Salesforce-native platform in place.
                    Net savings of {fmt(savings)}/yr with significant added capabilities — including document generation, automated SF record updates from signatures and form submissions, and a unified audit trail across all client interactions.
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
