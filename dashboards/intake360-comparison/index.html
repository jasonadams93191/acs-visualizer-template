                  ))}
                  <tr style={{ borderTop: "2px solid #BFDBFE", background: "#EFF6FF" }}>
                    <td colSpan={2} style={{ padding: "12px 18px", fontWeight: 700, fontFamily: "monospace", fontSize: 11, textTransform: "uppercase" }}>Proposed Base Total*</td>
                    <td style={{ padding: "12px 18px", textAlign: "right", fontWeight: 700, color: "#0070D2" }}>{fmt(proposedBase)}</td>
                    <td style={{ padding: "12px 14px", fontSize: 11, color: "#9CA3AF" }}>excl. BU fee + impl.</td>
                  </tr>
                  <tr style={{ borderTop: "2px solid #BBF7D0", background: "#F0FDF4" }}>
                    <td colSpan={2} style={{ padding: "12px 18px", fontWeight: 700, fontFamily: "monospace", fontSize: 11, textTransform: "uppercase", color: "#166534" }}>Base Savings</td>
                    <td style={{ padding: "12px 18px", textAlign: "right", fontWeight: 700, color: "#059669" }}>+{fmt(savings)}/yr</td>
                    <td />
                  </tr>
                </tbody>
              </table>

              <div style={{ background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 8, padding: "14px 18px", fontSize: 13, color: "#92400E", lineHeight: 1.6 }}>
                <strong>Important notes:</strong> The Ivinex Business Unit fee ($500/month = $6,000/yr) and Implementation hours ($200/hr) are not included in the base total above. Once scoped, these will reduce the net savings figure. Additionally, RingCX outbound per-minute rate ($0.016) is slightly higher than Regal ($0.012) — monitor OB usage at volume. Phone line costs are excluded from both stacks and should be compared separately.
              </div>
            </div>
          )}

          {/* FEATURES */}
          {activeTab === "features" && (
            <div>
              <table style={{ width: "100%", borderCollapse: "collapse", background: "#fff", borderRadius: 8, overflow: "hidden", border: "1px solid #E5E7EB", fontSize: 13 }}>
                <thead>
                  <tr style={{ background: "#1C1917" }}>
                    <th style={{ padding: "12px 18px", textAlign: "left", color: "#9CA3AF", fontWeight: 400, fontFamily: "monospace", fontSize: 10, letterSpacing: "0.1em", width: "48%" }}>CAPABILITY</th>
                    <th style={{ padding: "12px 14px", textAlign: "center", color: "#E8572A", fontWeight: 700, fontSize: 12 }}>Regal</th>
                    <th style={{ padding: "12px 14px", textAlign: "center", color: "#60A5FA", fontWeight: 700, fontSize: 12 }}>RingCX + Ivinex</th>
                  </tr>
                </thead>
                <tbody>
                  {data.features.map((cat, ci) => (
                    <>
                      <tr key={`cat-${ci}`} style={{ background: "#F9FAFB", cursor: "pointer" }} onClick={() => setExpandedCat(expandedCat === ci ? null : ci)}>
                        <td colSpan={3} style={{ padding: "9px 18px", fontWeight: 700, fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", color: "#374151", fontFamily: "monospace" }}>
                          {expandedCat === ci ? "▾" : "▸"} {cat.category}
                        </td>
                      </tr>
                      {(expandedCat === null || expandedCat === ci) && cat.items.map((item, ii) => (
                        <tr key={`item-${ci}-${ii}`} style={{ borderTop: "1px solid #F3F4F6", background: ii % 2 === 0 ? "#fff" : "#FAFAFA" }}>
                          <td style={{ padding: "10px 18px", color: "#374151" }}>{item.name}</td>
                          <td style={{ padding: "10px 14px", textAlign: "center" }}>{renderBool(item.regal)}</td>
                          <td style={{ padding: "10px 14px", textAlign: "center" }}>{renderBool(item.proposed)}</td>
                        </tr>
                      ))}
                    </>
                  ))}
                </tbody>
              </table>
              <div style={{ fontSize: 12, color: "#6B7280", fontFamily: "monospace", marginTop: 10 }}>
                Click a category row to isolate · <span style={{ color: "#059669" }}>✓</span> Available &nbsp; <span style={{ color: "#D1D5DB" }}>✗</span> Not Available
              </div>
            </div>
          )}

          {/* IVINEX */}
          {activeTab === "ivinex" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ background: "#F5F3FF", border: "2px solid #DDD6FE", borderLeft: "4px solid #7C3AED", borderRadius: 8, padding: 22 }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#7C3AED", marginBottom: 8 }}>{data.ivinex.headline}</div>
                <p style={{ fontSize: 13, color: "#374151", lineHeight: 1.7 }}>{data.ivinex.body}</p>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {data.ivinex.capabilities.map((cap, i) => (
                  <div key={i} style={{ background: "#fff", border: "1px solid #DDD6FE", borderLeft: "3px solid #7C3AED", borderRadius: 6, padding: 16 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#1C1917", marginBottom: 5 }}>{cap.title}</div>
                    <div style={{ fontSize: 12, color: "#374151", lineHeight: 1.6 }}>{cap.detail}</div>
                  </div>
                ))}
              </div>
              <div style={{ background: "#fff", border: "1px solid #E5E7EB", borderRadius: 8, padding: 18 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 10 }}>Why Ivinex Over Just Using Salesforce for Agents</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  {[
                    { label: "Salesforce", items: ["Built for CRM — not contact centers", "No native multi-tenant agent desktop", "Each client org requires a separate login", "No script pop for inbound calls", "Contact center features require expensive add-ons"] },
                    { label: "Ivinex", items: ["Built for answering services specifically", "Multi-tenant native — one desktop, many clients", "One login — all client orgs connected via API", "Script pop is core feature, not an add-on", "Connects to Salesforce and 50+ other systems"] },
                  ].map((col, i) => (
                    <div key={i}>
                      <div style={{ fontSize: 11, fontFamily: "monospace", fontWeight: 700, color: i === 0 ? "#DC2626" : "#7C3AED", marginBottom: 8, textTransform: "uppercase" }}>{col.label}</div>
                      {col.items.map((item, j) => (
                        <div key={j} style={{ fontSize: 12, color: "#374151", marginBottom: 5, paddingLeft: 10, borderLeft: `2px solid ${i === 0 ? "#FECACA" : "#DDD6FE"}` }}>{item}</div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* RINGSENSE */}
          {activeTab === "ringsense" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ background: "#EFF6FF", border: "2px solid #BFDBFE", borderLeft: "4px solid #0070D2", borderRadius: 8, padding: 22 }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#0070D2", marginBottom: 8 }}>{data.ringsense.headline}</div>
                <p style={{ fontSize: 13, color: "#374151", lineHeight: 1.7 }}>{data.ringsense.body}</p>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {data.ringsense.features.map((f, i) => (
                  <div key={i} style={{ background: "#fff", border: "1px solid #BFDBFE", borderLeft: "3px solid #0070D2", borderRadius: 6, padding: 16 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#1C1917", marginBottom: 5 }}>{f.title}</div>
                    <div style={{ fontSize: 12, color: "#374151", lineHeight: 1.6 }}>{f.detail}</div>
                  </div>
                ))}
              </div>
              <div style={{ background: "#F0FDF4", border: "1px solid #BBF7D0", borderRadius: 8, padding: "14px 18px" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#166534", marginBottom: 6 }}>Why This Matters for a Multi-Client Answering Service</div>
                <div style={{ fontSize: 13, color: "#374151", lineHeight: 1.7 }}>
                  At the volume Intake360 operates, manually reviewing calls is not realistic. RingSense scores every call automatically — supervisors get a prioritized list of calls that need attention instead of listening to random samples. Per-client scorecards mean each law firm client gets QA benchmarks tailored to their intake requirements, not a one-size-fits-all approach.
                </div>
              </div>
            </div>
          )}

          {/* MIGRATION */}
          {activeTab === "migration" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
              <div style={{ position: "relative" }}>
                <div style={{ position: "absolute", left: 104, top: 12, bottom: 80, width: 2, background: "#E5E7EB" }} />
                {data.migration.map((phase, i) => (
                  <div key={i} style={{ display: "flex", gap: 20, marginBottom: 28, position: "relative" }}>
                    <div style={{ width: 80, textAlign: "right", flexShrink: 0, paddingTop: 2 }}>
                      <div style={{ fontSize: 10, fontFamily: "monospace", color: "#9CA3AF" }}>{phase.phase}</div>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#374151", marginTop: 2 }}>{phase.label}</div>
                    </div>
                    <div style={{ width: 24, height: 24, borderRadius: "50%", background: phase.color, flexShrink: 0, marginTop: 2, zIndex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontWeight: 700 }}>{i + 1}</div>
                    <div style={{ flex: 1 }}>
                      {phase.items.map((item, j) => (
                        <div key={j} style={{ background: "#fff", border: "1px solid #E5E7EB", borderRadius: 6, padding: "10px 16px", marginBottom: 8, fontSize: 13, color: "#374151", lineHeight: 1.5 }}>{item}</div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ background: "#F0FDF4", border: "1px solid #BBF7D0", borderRadius: 8, padding: "14px 18px" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#166534", marginBottom: 4 }}>Expected Outcome — ~6 Weeks</div>
                <div style={{ fontSize: 13, color: "#14532D", lineHeight: 1.6 }}>
                  Regal cancelled. All agents in one Ivinex desktop connected to RingCX and every client Salesforce org. New clients onboarded via Ivinex API Hub without agent login changes. RingSense scoring every call. Base savings of {fmt(savings)}/yr realized — with significant operational efficiency gains beyond pure cost.
                </div>
              </div>
            </div>
          )}

        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
